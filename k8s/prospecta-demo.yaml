apiVersion: v1
kind: Namespace
metadata:
  name: prospecta-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prospecta-demo-config
  namespace: prospecta-demo
data:
  AUTH_ALLOWED_ORG_ID: demo-organization
  AUTH_DEV_BYPASS_ENABLED: "true"
  AUTH_OIDC_CLIENT_ID: replace-with-oidc-client-id
  AUTH_OIDC_ISSUER: https://identity.example.com/demo
  AUTH_URL: http://192.168.0.20:30097
  FEATURE_BATCH_OBSERVATION_ENABLED: "true"
  FEATURE_COMMERCIAL_ENABLED: "false"
  FEATURE_DEMO_DATA_ENABLED: "true"
  FEATURE_IMPORTS_ENABLED: "true"
  FEATURE_SENSITIVE_CONTENT_ENABLED: "false"
  IMPORT_MAX_BYTES: "10485760"
  IMPORT_PRODUCER_TIMEOUT_MS: "15000"
  N8N_IMPORT_URL: http://192.168.0.20:30098/webhook/empresaqui/import
  SENSITIVE_URL_HOSTS: evidence.example.com,reports.example.com
---
apiVersion: v1
kind: Secret
metadata:
  name: prospecta-demo-secrets
  namespace: prospecta-demo
type: Opaque
stringData:
  APP_DATABASE_URL: postgresql://prospecta_app:replace-with-password@postgres.example.invalid:5432/prospecta
  AUTH_OIDC_CLIENT_SECRET: replace-with-oidc-client-secret
  AUTH_SECRET: replace-with-a-random-demo-secret-at-least-32-bytes
  DATABASE_URL: postgresql://readonly_user:replace-with-password@postgres.example.invalid:5432/read_only_leads
  PRODUCER_DATABASE_URL: postgresql://producer_reader:replace-with-password@postgres.example.invalid:5432/producer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prospecta-demo
  namespace: prospecta-demo
  labels:
    app: prospecta-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prospecta-demo
  template:
    metadata:
      labels:
        app: prospecta-demo
    spec:
      containers:
        - name: prospecta
          image: localhost:5000/prospecta/app:demo
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: prospecta-demo-config
            - secretRef:
                name: prospecta-demo-secrets
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: prospecta-demo
  namespace: prospecta-demo
  labels:
    app: prospecta-demo
spec:
  type: NodePort
  selector:
    app: prospecta-demo
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30097
